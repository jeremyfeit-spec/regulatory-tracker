# Authoritative sources per country.
# The weekly job iterates over each country and pulls from:
#   1. official_sites — government tax authorities (highest authority)
#   2. advisory_firms — global Big 4 / advisory aggregators (broad coverage)
#   3. news_feeds — tax/regulatory news (early signal)
#   4. web_search — fallback LLM-driven search per country/job

global_advisory:
  - {name: "PwC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com/", type: "advisory"}
  - {name: "EY Global Tax Alerts", url: "https://www.ey.com/en_gl/tax-alerts", type: "advisory"}
  - {name: "KPMG TaxNewsFlash", url: "https://kpmg.com/xx/en/our-insights/regulatory-insights/taxnewsflash.html", type: "advisory"}
  - {name: "Deloitte Tax@Hand", url: "https://www.taxathand.com/", type: "advisory"}
  - {name: "BDO Global Tax Alerts", url: "https://www.bdo.global/en-gb/insights", type: "advisory"}

global_news:
  - {name: "Bloomberg Tax", url: "https://news.bloombergtax.com/", type: "news"}
  - {name: "Tax Notes International", url: "https://www.taxnotes.com/tax-notes-international", type: "news"}
  - {name: "International Tax Review", url: "https://www.internationaltaxreview.com/", type: "news"}
  - {name: "VATCalc News", url: "https://www.vatcalc.com/news/", type: "news"}
  - {name: "Avalara VAT Live", url: "https://www.avalara.com/vatlive/en/vat-news.html", type: "news"}
  - {name: "Sovos Regulatory Analysis", url: "https://sovos.com/regulatory-updates/", type: "news"}

