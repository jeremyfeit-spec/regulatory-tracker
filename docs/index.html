<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Regulatory Tracker — International Compliance Database</title>
<style>
  :root {
    --bg: #f7f8fb; --card: #ffffff; --border: #e5e7eb;
    --ink: #0f172a; --muted: #64748b;
    --brand: #2563eb; --brand-soft: #eff6ff;
    --green: #16a34a; --green-soft: #dcfce7;
    --amber: #d97706; --amber-soft: #fef3c7;
    --red: #dc2626; --red-soft: #fee2e2;
    --slate: #475569; --slate-soft: #f1f5f9;
    --shadow: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .topbar { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 22px; display: flex; align-items: center; gap: 18px; box-shadow: var(--shadow); margin-bottom: 18px; flex-wrap: wrap; }
  .topbar h1 { margin: 0; font-size: 18px; color: var(--brand); font-weight: 700; }
  .topbar .sub { color: var(--muted); font-size: 14px; }
  .tabs { margin-left: auto; display: flex; gap: 8px; }
  .tab { padding: 8px 16px; border-radius: 10px; background: var(--slate-soft); color: var(--slate); font-weight: 600; font-size: 14px; cursor: pointer; border: 1px solid transparent; }
  .tab.active { background: var(--brand); color: #fff; }

  .selector { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 22px; box-shadow: var(--shadow); margin-bottom: 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .selector label { font-weight: 700; font-size: 15px; }
  .selector input[type=search] { flex: 0 0 260px; border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 14px; background: #fafafa; }
  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-size: 14px; cursor: pointer; color: var(--ink); }
  .pill:hover { border-color: var(--brand); }
  .pill.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .hero { border-radius: 16px; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #3b82f6 100%); color: #fff; padding: 28px 30px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .hero .eyebrow { letter-spacing: .14em; font-size: 11px; opacity: .85; margin-bottom: 6px; text-transform: uppercase; }
  .hero h2 { margin: 0 0 6px 0; font-size: 28px; font-weight: 700; }
  .hero p { margin: 0; opacity: .9; font-size: 14px; }
  .hero .stats { display: flex; gap: 28px; margin-top: 18px; flex-wrap: wrap; }
  .stat { display: flex; align-items: baseline; gap: 8px; }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .lbl { font-size: 12px; opacity: .85; text-transform: uppercase; letter-spacing: .08em; }
  .stat.danger { background: rgba(220,38,38,.92); padding: 8px 14px; border-radius: 10px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .bucket { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow); }
  .bucket .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .bucket h3 { margin: 0; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .bucket .count { font-size: 11px; color: var(--muted); }
  .bucket .desc { font-size: 13px; color: var(--muted); margin: 6px 0 12px 0; line-height: 1.45; }
  .entry { border-top: 1px solid var(--border); padding: 10px 0; font-size: 13px; }
  .entry .title { font-weight: 600; color: var(--ink); }
  .entry .summary { color: var(--slate); margin-top: 3px; line-height: 1.45; }
  .entry .meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
  .badge.live { background: var(--green-soft); color: var(--green); }
  .badge.upcoming { background: var(--amber-soft); color: var(--amber); }
  .badge.in_progress { background: var(--brand-soft); color: var(--brand); }
  .badge.monitoring { background: var(--slate-soft); color: var(--slate); }
  .badge.repealed { background: var(--red-soft); color: var(--red); }
  .meta .eff { font-size: 11px; color: var(--muted); }
  .meta a { font-size: 11px; color: var(--brand); text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; padding: 8px 0; }

  .news-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; box-shadow: var(--shadow); margin-bottom: 18px; }
  .news-panel h2 { margin: 0 0 12px 0; font-size: 18px; }
  .news-panel .row { padding: 10px 0; border-top: 1px solid var(--border); display: grid; grid-template-columns: 90px 1fr auto; gap: 12px; align-items: baseline; }
  .news-panel .country-tag { font-size: 11px; font-weight: 700; color: var(--brand); }
  .news-panel .title { font-size: 14px; font-weight: 600; }
  .news-panel .summary { font-size: 13px; color: var(--slate); margin-top: 3px; }

  .region-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .region-table th, .region-table td { border-bottom: 1px solid var(--border); padding: 8px 10px; text-align: left; }
  .region-table th { font-weight: 600; color: var(--slate); background: var(--slate-soft); }
  .region-table .num { text-align: right; font-variant-numeric: tabular-nums; }

  .footer { color: var(--muted); font-size: 12px; text-align: center; margin: 24px 0 8px 0; }
  .hidden { display: none !important; }
  .err { background: var(--red-soft); border: 1px solid var(--red); color: var(--red); padding: 10px 14px; border-radius: 10px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <h1>Regulatory Tracker</h1>
    <span class="sub" id="sub-line">Loading…</span>
    <div class="tabs">
      <button class="tab active" data-view="country">Country Overview</button>
      <button class="tab" data-view="whats-new">What's New</button>
      <button class="tab" data-view="regions">Regions</button>
    </div>
  </div>

  <section id="view-country">
    <div class="selector">
      <label for="country-search">Select Country</label>
      <input id="country-search" type="search" placeholder="Search countries…" />
      <div class="pills" id="country-pills"></div>
    </div>

    <div class="hero">
      <div class="eyebrow" id="hero-eyebrow">Loading…</div>
      <h2 id="hero-title">—</h2>
      <p id="hero-sub">Click any bucket to see the regulations driving compliance work in this market.</p>
      <div class="stats">
        <div class="stat"><span class="num" id="stat-live">0</span><span class="lbl">Live mandates</span></div>
        <div class="stat"><span class="num" id="stat-upcoming">0</span><span class="lbl">Upcoming</span></div>
        <div class="stat"><span class="num" id="stat-monitor">0</span><span class="lbl">Monitoring</span></div>
        <div class="stat danger"><span class="num" id="stat-total">0</span><span class="lbl">Total tracked</span></div>
      </div>
    </div>

    <div class="grid" id="bucket-grid"></div>
  </section>

  <section id="view-whats-new" class="hidden">
    <div class="news-panel">
      <h2>This week — new regulations</h2>
      <div id="news-new"></div>
    </div>
    <div class="news-panel">
      <h2>Updated entries</h2>
      <div id="news-updated"></div>
    </div>
  </section>

  <section id="view-regions" class="hidden">
    <div class="news-panel">
      <h2>Coverage by region</h2>
      <table class="region-table" id="region-table"></table>
    </div>
  </section>

  <div class="footer" id="footer-line">Loading…</div>
</div>

<script>
const PRIORITY_ISO = ["GB","DE","FR","ES","IT","CA","MX","BR","IN","AU","SG","ZA"];
const REGION_ORDER = ["EMEA","APAC","LATAM","NORTH_AMERICA"];
const REGION_LABEL = { EMEA: "EMEA", APAC: "APAC", LATAM: "LATAM", NORTH_AMERICA: "North America" };
const STATUS_ORDER = ["live","upcoming","in_progress","monitoring","repealed"];
const BUCKET_ICONS = { tax_filing: "📑", vat_gst: "🧾", e_invoicing: "📨", payroll: "👥", local_gaap: "📊", banking_payments: "🏦" };

let DATA = null, SELECTED = "GB";

async function boot() {
  try {
    const resp = await fetch("./data.json", { cache: "no-cache" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    DATA = await resp.json();
  } catch (e) {
    document.querySelector(".wrap").insertAdjacentHTML("afterbegin",
      `<div class="err">Couldn't load data.json — make sure the file is published next to index.html. (${e.message})</div>`);
    return;
  }
  renderPills(); renderRegions(); renderWhatsNew(); bindTabs(); bindSearch();
  selectCountry(SELECTED); updateFooter();
}

function bindTabs() {
  document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    const view = t.dataset.view;
    ["country","whats-new","regions"].forEach(v => document.getElementById("view-" + v).classList.toggle("hidden", v !== view));
  }));
}
function bindSearch() {
  const input = document.getElementById("country-search");
  input.addEventListener("input", () => {
    const q = input.value.trim().toLowerCase();
    document.querySelectorAll("#country-pills .pill").forEach(p => {
      const match = !q || p.textContent.toLowerCase().includes(q) || p.dataset.iso.toLowerCase() === q;
      p.style.display = match ? "" : "none";
    });
  });
}
function renderPills() {
  const wrap = document.getElementById("country-pills"); wrap.innerHTML = "";
  const priority = [], rest = [];
  DATA.countries.forEach(c => (PRIORITY_ISO.includes(c.iso) ? priority : rest).push(c));
  priority.sort((a,b) => PRIORITY_ISO.indexOf(a.iso) - PRIORITY_ISO.indexOf(b.iso));
  rest.sort((a,b) => a.name.localeCompare(b.name));
  [...priority, ...rest].forEach(c => {
    const btn = document.createElement("button");
    btn.className = "pill" + (c.iso === SELECTED ? " active" : "");
    btn.dataset.iso = c.iso; btn.textContent = c.name;
    btn.addEventListener("click", () => selectCountry(c.iso));
    wrap.appendChild(btn);
  });
}
function selectCountry(iso) {
  SELECTED = iso;
  document.querySelectorAll("#country-pills .pill").forEach(p => p.classList.toggle("active", p.dataset.iso === iso));
  const c = DATA.countries.find(x => x.iso === iso); if (!c) return;
  document.getElementById("hero-eyebrow").textContent = `${REGION_LABEL[c.region] || c.region} · ${monthName()}`;
  document.getElementById("hero-title").textContent = `${c.name} — ${countTotal(c)} tracked regulations across 6 compliance jobs`;
  document.getElementById("hero-sub").textContent = `Currency ${c.currency} · synced ${shortDate(c.last_synced)}`;
  const counts = countByStatus(c);
  document.getElementById("stat-live").textContent = counts.live || 0;
  document.getElementById("stat-upcoming").textContent = counts.upcoming || 0;
  document.getElementById("stat-monitor").textContent = counts.monitoring || 0;
  document.getElementById("stat-total").textContent = countTotal(c);
  const grid = document.getElementById("bucket-grid"); grid.innerHTML = "";
  DATA.compliance_jobs.forEach(job => {
    const items = (c.compliance && c.compliance[job.id]) || [];
    items.sort((a,b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status));
    const card = document.createElement("div"); card.className = "bucket";
    card.innerHTML = `
      <div class="head"><h3>${BUCKET_ICONS[job.id] || "•"} ${escapeHtml(job.name)}</h3><span class="count">${items.length} item${items.length===1?"":"s"}</span></div>
      <div class="desc">${escapeHtml(job.description)}</div>
      <div class="entries"></div>`;
    const entries = card.querySelector(".entries");
    if (!items.length) entries.innerHTML = `<div class="empty">No regulations seeded yet — weekly job will populate.</div>`;
    else items.forEach(e => {
      const row = document.createElement("div"); row.className = "entry";
      row.innerHTML = `
        <div class="title">${escapeHtml(e.title)}</div>
        <div class="summary">${escapeHtml(e.summary || "")}</div>
        <div class="meta">
          <span class="badge ${e.status}">${e.status.replace("_"," ")}</span>
          <span class="eff">eff. ${escapeHtml(e.effective_date || "TBD")}</span>
          ${e.source ? `<a href="${escapeAttr(e.source)}" target="_blank" rel="noopener">source ↗</a>` : ""}
        </div>`;
      entries.appendChild(row);
    });
    grid.appendChild(card);
  });
}
function renderWhatsNew() {
  const diff = DATA.latest_diff || { new: [], updated: [] };
  const wrap = (host, items) => {
    const el = document.getElementById(host);
    if (!items || !items.length) { el.innerHTML = `<div class="empty">Nothing this week.</div>`; return; }
    el.innerHTML = "";
    items.forEach(it => {
      const row = document.createElement("div"); row.className = "row";
      row.innerHTML = `
        <div class="country-tag">${escapeHtml(it.country)} · ${escapeHtml(it.iso)}</div>
        <div><div class="title">${escapeHtml(it.title)}</div><div class="summary">${escapeHtml(it.summary || "")}</div></div>
        <span class="badge ${it.status||"monitoring"}">${(it.status||"").replace("_"," ")}</span>`;
      el.appendChild(row);
    });
  };
  wrap("news-new", diff.new); wrap("news-updated", diff.updated);
}
function renderRegions() {
  const t = document.getElementById("region-table");
  t.innerHTML = `<thead><tr><th>Region</th><th>Country</th><th class="num">Live</th><th class="num">Upcoming</th><th class="num">Monitoring</th><th class="num">Total</th><th>Last synced</th></tr></thead><tbody></tbody>`;
  const tbody = t.querySelector("tbody");
  REGION_ORDER.forEach(region => {
    DATA.countries.filter(c => c.region === region).sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
      const counts = countByStatus(c);
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${REGION_LABEL[region]}</td><td><a href="#" data-iso="${c.iso}">${escapeHtml(c.name)}</a></td><td class="num">${counts.live||0}</td><td class="num">${counts.upcoming||0}</td><td class="num">${counts.monitoring||0}</td><td class="num">${countTotal(c)}</td><td>${shortDate(c.last_synced)}</td>`;
      tr.querySelector("a").addEventListener("click", ev => { ev.preventDefault(); document.querySelector('.tab[data-view="country"]').click(); selectCountry(c.iso); window.scrollTo({top:0,behavior:"smooth"}); });
      tbody.appendChild(tr);
    });
  });
}
function updateFooter() {
  const generated = DATA.generated_at ? new Date(DATA.generated_at) : null;
  document.getElementById("footer-line").textContent = `Last build ${generated ? generated.toUTCString() : "—"} · ${DATA.countries.length} countries · ${DATA.compliance_jobs.length} compliance jobs`;
  document.getElementById("sub-line").textContent = `Compliance database · ${DATA.countries.length} countries · ${DATA.compliance_jobs.length} jobs`;
}
function countByStatus(c) { const o = {}; Object.values(c.compliance||{}).forEach(a => a.forEach(e => o[e.status] = (o[e.status]||0)+1)); return o; }
function countTotal(c) { return Object.values(c.compliance||{}).reduce((s,a) => s+a.length, 0); }
function shortDate(iso) { if(!iso) return "—"; try { return new Date(iso).toISOString().slice(0,10); } catch(_){ return iso; } }
function monthName() { return new Date().toLocaleString("en", { month: "long", year: "numeric" }).toUpperCase(); }
function escapeHtml(s) { return String(s||"").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch]); }
function escapeAttr(s) { return escapeHtml(s); }
boot();
</script>
</body>
</html>
